name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle
        run: make setup

      - name: Run tests
        run: make test

      - name: Run lint
        run: |
          brew install swiftlint
          make lint

      - name: Build
        run: make VERSION=${{ steps.version.outputs.version }}

      - name: Create DMG
        run: make dmg

      - name: Create ZIP
        run: make zip

      - name: Compute checksums
        run: |
          cd build
          shasum -a 256 BilingualSwitcher.dmg BilingualSwitcher.zip > checksums.txt
          cat checksums.txt

      - name: Sign ZIP with Sparkle EdDSA
        id: sign
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          echo -n "$SPARKLE_EDDSA_KEY" > "$KEY_FILE"
          # sign_update outputs: sparkle:edSignature="SIG" length="LEN"
          RAW=$(Vendor/bin/sign_update --ed-key-file "$KEY_FILE" build/BilingualSwitcher.zip)
          rm -f "$KEY_FILE"
          # Parse signature and length from output
          ED_SIG=$(echo "$RAW" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          ED_LEN=$(echo "$RAW" | sed 's/.*length="\([^"]*\)".*/\1/')
          echo "signature=$ED_SIG" >> "$GITHUB_OUTPUT"
          echo "length=$ED_LEN" >> "$GITHUB_OUTPUT"
          echo "EdDSA signature: $ED_SIG (length: $ED_LEN)"

      - name: Update appcast.xml
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ED_SIG=${{ steps.sign.outputs.signature }}
          ED_LEN=${{ steps.sign.outputs.length }}
          URL="https://github.com/komandakycto/bilingual-switcher/releases/download/${GITHUB_REF_NAME}/BilingualSwitcher.zip"

          cat > docs/appcast.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Bilingual Switcher</title>
              <link>https://github.com/komandakycto/bilingual-switcher</link>
              <language>en</language>
            </channel>
          </rss>
          XMLEOF

          # Use sed to insert the item before closing </channel> to avoid heredoc variable issues
          sed -i '' "s|</channel>|  <item>\n        <title>Version ${VERSION}</title>\n        <sparkle:version>${VERSION}</sparkle:version>\n        <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>\n        <enclosure url=\"${URL}\"\n                   sparkle:edSignature=\"${ED_SIG}\"\n                   length=\"${ED_LEN}\"\n                   type=\"application/octet-stream\"/>\n      </item>\n    </channel>|" docs/appcast.xml

      - name: Update Homebrew cask
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA256=$(shasum -a 256 build/BilingualSwitcher.zip | cut -d' ' -f1)
          URL="https://github.com/komandakycto/bilingual-switcher/releases/download/${GITHUB_REF_NAME}/BilingualSwitcher.zip"

          mkdir -p Casks
          cat > Casks/bilingual-switcher.rb << EOF
          cask "bilingual-switcher" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${URL}"
            name "Bilingual Switcher"
            desc "Convert selected text between keyboard layouts with a hotkey"
            homepage "https://github.com/komandakycto/bilingual-switcher"

            app "BilingualSwitcher.app"

            zap trash: [
              "~/Library/Preferences/com.komandakycto.bilingual-switcher.plist",
            ]
          end
          EOF

      - name: Push appcast and cask updates
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH=main

          # Commit both files in ONE commit via the Git Data API. Two separate
          # Contents-API PUTs pushed two commits back-to-back, which triggered
          # two overlapping legacy Pages builds that raced and wedged the Pages
          # environment ("Deployment failed, try again later"). One commit →
          # one Pages build → no race.

          # Current branch tip and its tree.
          BASE_SHA=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/commits/${BASE_SHA}" --jq '.commit.tree.sha')

          # Upload each changed file as a blob.
          APPCAST_BLOB=$(gh api "repos/${REPO}/git/blobs" --method POST \
            -f content="$(base64 -i docs/appcast.xml)" -f encoding=base64 --jq '.sha')
          CASK_BLOB=$(gh api "repos/${REPO}/git/blobs" --method POST \
            -f content="$(base64 -i Casks/bilingual-switcher.rb)" -f encoding=base64 --jq '.sha')

          # New tree layering both blobs onto the base tree.
          TREE_SHA=$(jq -n \
            --arg base "$BASE_TREE" --arg appcast "$APPCAST_BLOB" --arg cask "$CASK_BLOB" \
            '{base_tree: $base, tree: [
               {path: "docs/appcast.xml",            mode: "100644", type: "blob", sha: $appcast},
               {path: "Casks/bilingual-switcher.rb", mode: "100644", type: "blob", sha: $cask}
             ]}' | gh api "repos/${REPO}/git/trees" --method POST --input - --jq '.sha')

          # Single commit on top of the current tip.
          COMMIT_SHA=$(jq -n \
            --arg msg "Update appcast and cask for ${VERSION} [skip ci]" \
            --arg tree "$TREE_SHA" --arg parent "$BASE_SHA" \
            '{message: $msg, tree: $tree, parents: [$parent]}' \
            | gh api "repos/${REPO}/git/commits" --method POST --input - --jq '.sha')

          # Fast-forward the branch to the new commit.
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" --method PATCH \
            -f sha="$COMMIT_SHA" -F force=false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/BilingualSwitcher.dmg \
            build/BilingualSwitcher.zip \
            build/checksums.txt \
            --title "Bilingual Switcher ${{ steps.version.outputs.version }}" \
            --generate-notes
