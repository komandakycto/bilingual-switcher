name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle
        run: make setup

      - name: Run tests
        run: make test

      - name: Run lint
        run: |
          brew install swiftlint
          make lint

      - name: Build
        run: make VERSION=${{ steps.version.outputs.version }}

      - name: Create DMG
        run: make dmg

      - name: Create ZIP
        run: make zip

      - name: Compute checksums
        run: |
          cd build
          shasum -a 256 BilingualSwitcher.dmg BilingualSwitcher.zip > checksums.txt
          cat checksums.txt

      - name: Sign ZIP with Sparkle EdDSA
        id: sign
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          echo -n "$SPARKLE_EDDSA_KEY" > "$KEY_FILE"
          # sign_update outputs: sparkle:edSignature="SIG" length="LEN"
          RAW=$(Vendor/bin/sign_update --ed-key-file "$KEY_FILE" build/BilingualSwitcher.zip)
          rm -f "$KEY_FILE"
          # Parse signature and length from output
          ED_SIG=$(echo "$RAW" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          ED_LEN=$(echo "$RAW" | sed 's/.*length="\([^"]*\)".*/\1/')
          echo "signature=$ED_SIG" >> "$GITHUB_OUTPUT"
          echo "length=$ED_LEN" >> "$GITHUB_OUTPUT"
          echo "EdDSA signature: $ED_SIG (length: $ED_LEN)"

      - name: Update appcast.xml
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ED_SIG=${{ steps.sign.outputs.signature }}
          ED_LEN=${{ steps.sign.outputs.length }}
          URL="https://github.com/komandakycto/bilingual-switcher/releases/download/${GITHUB_REF_NAME}/BilingualSwitcher.zip"

          cat > docs/appcast.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Bilingual Switcher</title>
              <link>https://github.com/komandakycto/bilingual-switcher</link>
              <language>en</language>
            </channel>
          </rss>
          XMLEOF

          # Use sed to insert the item before closing </channel> to avoid heredoc variable issues
          sed -i '' "s|</channel>|  <item>\n        <title>Version ${VERSION}</title>\n        <sparkle:version>${VERSION}</sparkle:version>\n        <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>\n        <enclosure url=\"${URL}\"\n                   sparkle:edSignature=\"${ED_SIG}\"\n                   length=\"${ED_LEN}\"\n                   type=\"application/octet-stream\"/>\n      </item>\n    </channel>|" docs/appcast.xml

      - name: Update Homebrew cask
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA256=$(shasum -a 256 build/BilingualSwitcher.zip | cut -d' ' -f1)
          URL="https://github.com/komandakycto/bilingual-switcher/releases/download/${GITHUB_REF_NAME}/BilingualSwitcher.zip"

          mkdir -p Casks
          cat > Casks/bilingual-switcher.rb << EOF
          cask "bilingual-switcher" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${URL}"
            name "Bilingual Switcher"
            desc "Convert selected text between keyboard layouts with a hotkey"
            homepage "https://github.com/komandakycto/bilingual-switcher"

            app "BilingualSwitcher.app"

            zap trash: [
              "~/Library/Preferences/com.komandakycto.bilingual-switcher.plist",
            ]
          end
          EOF

      - name: Push appcast and cask updates
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for FILE in docs/appcast.xml Casks/bilingual-switcher.rb; do
            SHA=$(gh api "repos/${{ github.repository }}/contents/${FILE}" --jq '.sha' 2>/dev/null || echo "")
            CONTENT=$(base64 -i "$FILE")
            if [ -n "$SHA" ]; then
              gh api "repos/${{ github.repository }}/contents/${FILE}" \
                --method PUT \
                -f message="Update ${FILE} for ${VERSION} [skip ci]" \
                -f content="$CONTENT" \
                -f sha="$SHA" \
                -f branch="main"
            else
              gh api "repos/${{ github.repository }}/contents/${FILE}" \
                --method PUT \
                -f message="Update ${FILE} for ${VERSION} [skip ci]" \
                -f content="$CONTENT" \
                -f branch="main"
            fi
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/BilingualSwitcher.dmg \
            build/BilingualSwitcher.zip \
            build/checksums.txt \
            --title "Bilingual Switcher ${{ steps.version.outputs.version }}" \
            --generate-notes
